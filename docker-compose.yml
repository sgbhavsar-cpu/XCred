# Local Docker Desktop stack for testing XCred end-to-end (see docs/testing.md).
# Brings up SQL Server + the API/SPA on one origin so Playwright can drive the real UI
# without any CORS/dev-proxy complications.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "XCred_Docker_Test_2026!"
    ports:
      - "14330:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=XCredDb;User Id=sa;Password=XCred_Docker_Test_2026!;TrustServerCertificate=True;"
      Jwt__Secret: "xcred-docker-test-harness-only-secret-do-not-use-in-production-1234"
      AllowedOrigins: "http://localhost:18080"
    ports:
      - "18080:8080"
